<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <!-- PWA Anti-Cache Shield v2 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="preload" as="image" href="/logo_panaderia.png" />
  <link rel="icon" type="image/png" href="/logo_panaderia.png" />
  <link rel="apple-touch-icon" href="/logo_panaderia.png" />
  <title>Panaderia Dulce Placer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0f172a;
      color: white;
      width: 100%;
      height: 100vh;
      overflow-x: hidden;
      font-family: sans-serif;
      overscroll-behavior-y: contain;
    }

    #root {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    /* ── Animaciones del loader HTML ── */
    @keyframes spin-cw  { to { transform: rotate(360deg);  } }
    @keyframes spin-ccw { to { transform: rotate(-360deg); } }
    @keyframes float-logo {
      0%, 100% { transform: translateY(0px);  }
      50%       { transform: translateY(-6px); }
    }
    @keyframes pulse-text {
      0%, 100% { opacity: 1;   }
      50%       { opacity: 0.4; }
    }
    @keyframes bar-sweep {
      0%   { transform: translateX(-150%); }
      100% { transform: translateX(350%);  }
    }
  </style>
  <script>
    console.log("🚀 Antigravity Shield: Booting Protection Protocols...");
    
    // [Shield] Desregistro de Service Workers en Localhost (Previene bloqueos en DEV)
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          for (let r of regs) {
            r.unregister();
            console.warn("🛡️ [Shield] Service Worker de desarrollo desregistrado para evitar bloqueos.");
          }
        });
      }
    }

    // [Nexus-Volt] Cache Slayer v3.0 - Fuerza consistencia de versión
    (function() {
      const STORAGE_KEY = 'nexus_build_ts';
      const checkVersion = () => {
        fetch('/version.json?cb=' + Date.now(), { cache: 'no-store' })
          .then(r => r.json())
          .then(data => {
            const localTs = parseInt(localStorage.getItem(STORAGE_KEY) || '0');
            // Si hay un cambio de versión real detectado
            if (localTs !== 0 && data.timestamp > localTs) {
              console.warn("🚨 [Nexus-Shield] Nueva actualización detectada en servidor. Sincronizando...");
              localStorage.setItem(STORAGE_KEY, data.timestamp);
              
              // Limpiar caches de navegador
              if ('caches' in window) {
                caches.keys().then(names => {
                  for (let name of names) caches.delete(name);
                });
              }

              // Recarga inteligente con bypass de cache del navegador
              setTimeout(() => {
                location.replace(location.href);
              }, 500);
            } else if (localTs === 0) {
              localStorage.setItem(STORAGE_KEY, data.timestamp);
            }
          }).catch(() => {});
      };
      
      checkVersion();
      setInterval(checkVersion, 300000); // Cada 5 minutos
    })();

    // Interceptor Global de Fallos de Importación (Shield Recovery)
    window.addEventListener('error', (e) => {
      const msg = e.message || '';
      if (msg.includes('Failed to fetch dynamically imported module') || 
          msg.includes('Importing a module script failed')) {
        
        console.error("🕵️ [Shield] Fallo de importación de módulo detectado globalmente.");
        
        // Evitar bucles infinitos de recarga
        const lastAutoReload = sessionStorage.getItem('last_module_fail_reload');
        const now = Date.now();
        
        if (!lastAutoReload || (now - parseInt(lastAutoReload)) > 60000) {
          sessionStorage.setItem('last_module_fail_reload', now.toString());
          console.warn("🔄 [Shield] Reintentando carga de aplicación limpia...");
          location.reload();
        }
      }
    }, true);

    window.onerror = (m, s, l, c, e) => {
      console.error("❌ CRITICAL BOOT ERROR:", m, s, l);
      // No ocultamos el error, pero permitimos recuperación
      if (m.includes('Failed to fetch dynamically imported module')) return; // Manejado por el listener de arriba
      
      const errorDiv = document.createElement('div');
      errorDiv.style = "position:fixed;inset:0;padding:40px;text-align:center;background:#0f172a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;font-family:sans-serif;";
      errorDiv.innerHTML = `
          <div style="background:rgba(255,0,127,0.1);padding:40px;border-radius:40px;border:1px solid rgba(255,0,127,0.2);max-width:400px;">
            <h1 style="color: #ff007f;font-weight:900;margin-bottom:16px;text-transform:uppercase;font-style:italic;">Inconsistencia de Red</h1>
            <p style="opacity: 0.7;margin-bottom:24px;font-size:14px;line-height:1.5;">Hemos detectado un problema al cargar los recursos del sistema. Esto suele resolverse con una recarga de seguridad.</p>
            <button onclick="location.reload(true)" style="padding:16px 32px;background:#ff007f;color:#fff;border:none;border-radius:20px;font-weight:900;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;box-shadow:0 10px 20px rgba(255,0,127,0.3);">Reiniciar Sistema</button>
          </div>
      `;
      document.body.appendChild(errorDiv);
    };
  </script>
</head>

<body>
  <div id="root">
    <!-- Pantalla de carga pre-React: se reemplaza cuando React monta -->
    <div style="
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
    ">
      <!-- Anillos orbitales -->
      <div style="position: relative; width: 176px; height: 176px; margin-bottom: 32px;">

        <!-- Anillo exterior: 4s horario, rosa -->
        <div style="
          position: absolute; inset: 0; border-radius: 50%;
          border: 2px solid transparent;
          border-top-color: rgba(255,0,127,0.7);
          border-right-color: rgba(255,0,127,0.2);
          animation: spin-cw 4s linear infinite;
        "></div>

        <!-- Anillo medio: 2.8s antihorario, indigo -->
        <div style="
          position: absolute; inset: 16px; border-radius: 50%;
          border: 2px solid transparent;
          border-top-color: rgba(99,102,241,0.8);
          border-right-color: rgba(99,102,241,0.2);
          animation: spin-ccw 2.8s linear infinite;
        "></div>

        <!-- Anillo interior: 1.6s horario, blanco -->
        <div style="
          position: absolute; inset: 32px; border-radius: 50%;
          border: 1px solid transparent;
          border-top-color: rgba(255,255,255,0.6);
          border-right-color: rgba(255,255,255,0.1);
          animation: spin-cw 1.6s linear infinite;
        "></div>

        <!-- Logo flotando -->
        <div style="
          position: absolute; inset: 0;
          display: flex; align-items: center; justify-content: center;
          animation: float-logo 3s ease-in-out infinite;
        ">
          <!-- Placeholder rosado mientras carga la imagen -->
          <div style="
            position: absolute; width: 80px; height: 80px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,0,127,0.25) 0%, rgba(30,27,75,0.5) 100%);
            box-shadow: 0 0 24px rgba(255,0,127,0.35);
          "></div>
          <img
            src="/logo_panaderia.png"
            alt="Dulce Placer"
            style="
              position: relative; width: 80px; height: 80px; object-fit: contain;
              filter: drop-shadow(0 0 16px rgba(255,0,127,0.6));
            "
          />
        </div>
      </div>

      <!-- Texto -->
      <p style="
        color: #ff007f; font-weight: 900; text-transform: uppercase;
        letter-spacing: 0.4em; font-style: italic; font-size: 13px;
        animation: pulse-text 1.5s ease-in-out infinite;
        margin-bottom: 16px;
      ">Dulce Placer...</p>

      <!-- Barra animada -->
      <div style="
        width: 192px; height: 4px;
        background: rgba(255,255,255,0.06);
        border-radius: 9999px; overflow: hidden;
      ">
        <div style="
          height: 100%; width: 45%;
          background: linear-gradient(to right, #ff007f, #6366f1);
          border-radius: 9999px;
          animation: bar-sweep 1.6s ease-in-out infinite;
        "></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
